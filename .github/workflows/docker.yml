name: Build and Push Docker Image

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      publish_target:
        description: Publish target
        required: true
        type: choice
        default: both
        options:
          - docker
          - github
          - both

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: latest_tag
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "tag=${LATEST_TAG}" >> $GITHUB_OUTPUT
          echo "Latest tag: ${LATEST_TAG}"

      - name: Resolve publish targets
        id: targets
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TARGET="${{ inputs.publish_target }}"
          else
            TARGET="both"
          fi

          PUBLISH_DOCKER=false
          PUBLISH_GHCR=false

          case "${TARGET}" in
            docker)
              PUBLISH_DOCKER=true
              ;;
            github)
              PUBLISH_GHCR=true
              ;;
            both)
              PUBLISH_DOCKER=true
              PUBLISH_GHCR=true
              ;;
            *)
              echo "Unsupported publish target: ${TARGET}"
              exit 1
              ;;
          esac

          GHCR_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGES=()

          if [[ "${PUBLISH_DOCKER}" == "true" ]]; then
            IMAGES+=("xxnuo/mtranserver")
          fi

          if [[ "${PUBLISH_GHCR}" == "true" ]]; then
            IMAGES+=("ghcr.io/${GHCR_OWNER}/mtranserver")
          fi

          {
            echo "target=${TARGET}"
            echo "publish_docker=${PUBLISH_DOCKER}"
            echo "publish_ghcr=${PUBLISH_GHCR}"
            echo "images<<EOF"
            printf '%s\n' "${IMAGES[@]}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: steps.targets.outputs.publish_docker == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        if: steps.targets.outputs.publish_ghcr == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.targets.outputs.images }}
          flavor: |
            latest=false
          tags: |
            type=semver,pattern={{version}},value=${{ steps.latest_tag.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.latest_tag.outputs.tag }}
            type=semver,pattern={{major}},value=${{ steps.latest_tag.outputs.tag }}
            type=raw,value=latest

      - name: Get version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION=${{ steps.latest_tag.outputs.tag }}
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
